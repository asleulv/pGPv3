{% extends 'base.html' %}

{% block title %}pGP - Registrer deg{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-20">
    
    <!-- Header -->
    <div class="text-center mb-10 space-y-3">
        <div class="w-20 h-20 bg-indigo-500/10 text-indigo-500 rounded-[2.5rem] flex items-center justify-center text-4xl mx-auto shadow-inner">
            <i class="fas fa-user-plus"></i>
        </div>
        <h1 class="text-3xl font-black uppercase tracking-tighter">Bli med i pGP</h1>
        <p class="text-xs font-bold uppercase tracking-widest opacity-40">Opprett din musikalske profil</p>
    </div>

    <!-- Register Card -->
    <section class="card !p-8 md:!p-10 !rounded-[3rem] shadow-2xl border-2 border-indigo-500/10">
        <form method="POST" action="{% url 'register' %}" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label for="username" class="text-[10px] font-black uppercase tracking-widest opacity-40 ml-2">Brukarnamn</label>
                <input type="text" name="username" id="username" required 
                       class="w-full bg-gray-50/50 dark:bg-slate-900/50 border border-gray-100 dark:border-gray-800 rounded-2xl px-6 py-4 text-sm focus:border-indigo-500 outline-none transition-all shadow-inner font-medium" />
            </div>

            <div class="space-y-2">
                <label for="email" class="text-[10px] font-black uppercase tracking-widest opacity-40 ml-2">E-postadresse</label>
                <input type="email" name="email" id="email" required 
                       class="w-full bg-gray-50/50 dark:bg-slate-900/50 border border-gray-100 dark:border-gray-800 rounded-2xl px-6 py-4 text-sm focus:border-indigo-500 outline-none transition-all shadow-inner font-medium" />
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label for="password1" class="text-[10px] font-black uppercase tracking-widest opacity-40 ml-2">Passord</label>
                    <input type="password" name="password1" id="password1" required 
                           class="w-full bg-gray-50/50 dark:bg-slate-900/50 border border-gray-100 dark:border-gray-800 rounded-xl px-4 py-3 text-xs focus:border-indigo-500 outline-none transition-all shadow-inner" />
                </div>
                <div class="space-y-2">
                    <label for="password2" class="text-[10px] font-black uppercase tracking-widest opacity-40 ml-2">Bekreft</label>
                    <input type="password" name="password2" id="password2" required 
                           class="w-full bg-gray-50/50 dark:bg-slate-900/50 border border-gray-100 dark:border-gray-800 rounded-xl px-4 py-3 text-xs focus:border-indigo-500 outline-none transition-all shadow-inner" />
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="btn btn-primary w-full !rounded-2xl !py-5 text-base font-black shadow-2xl shadow-indigo-500/30 tracking-widest uppercase">
                    Registrer meg!
                </button>
            </div>
        </form>

        <div class="mt-8 pt-8 border-t border-gray-50 dark:border-gray-800 text-center">
            <p class="text-[10px] uppercase font-bold opacity-30 inline">Allereie brukar?</p>
            <a href="{% url 'login' %}" class="text-[10px] font-black uppercase tracking-widest text-indigo-400 hover:text-indigo-500 ml-1">Logg inn her</a>
        </div>
    </section>
</div>
{% endblock %}
