{% extends 'base.html' %}

{% block title %}pGP - Sent!{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-20 text-center">
    <div class="w-20 h-20 bg-green-500/10 text-green-500 rounded-[2.5rem] flex items-center justify-center text-4xl mx-auto mb-10 shadow-inner">
        <i class="fas fa-paper-plane"></i>
    </div>
    
    <div class="card !p-12 !rounded-[3rem] shadow-2xl space-y-8">
        <div class="space-y-4">
            <h1 class="text-3xl font-black uppercase tracking-tighter">Sjekk e-posten!</h1>
            <p class="text-[10px] font-bold uppercase tracking-widest opacity-40 leading-relaxed">
                Vi har sendt ei lenke til nullstilling av passord. Hugs å sjekke søppelposten viss den ikkje dukkar opp!
            </p>
        </div>
        
        <div class="pt-4">
            <a href="{% url 'login' %}" class="text-[10px] font-black uppercase tracking-widest text-indigo-400 opacity-60 hover:opacity-100 transition-opacity">
                Tilbake til logg inn
            </a>
        </div>
    </div>
</div>
{% endblock %}
