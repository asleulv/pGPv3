{% extends 'base.html' %}

{% block title %}pGP - Logga ut{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-20 text-center">
    <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-[2.5rem] flex items-center justify-center text-4xl mx-auto mb-10 shadow-inner">
        <i class="fas fa-sign-out-alt"></i>
    </div>
    
    <div class="card !p-12 !rounded-[3rem] shadow-2xl space-y-8">
        <div class="space-y-4">
            <h1 class="text-3xl font-black uppercase tracking-tighter">Du er logga ut</h1>
            <p class="text-xs font-bold uppercase tracking-widest opacity-40">Takk for besøket, ses snart!</p>
        </div>
        
        <div class="pt-4">
            <a href="{% url 'login' %}" class="btn btn-primary w-full !rounded-2xl !py-5 text-base font-black shadow-2xl shadow-indigo-500/30 tracking-widest uppercase">
                Logg inn igjen
            </a>
        </div>
    </div>
</div>
{% endblock %}
